<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 03 — Operadores binarios</title>
</head>
<body>

    <h1>Ejercicio 03 — Operadores binarios</h1>

    <script>
        // Variables
        var A = 10;
        var B = 20;

        // Variables para operaciones
        var multiplica = A * B;
        var divide = A / B;
        var suma = A + B;
        var resta = A - B;

        // Salida de resultados aritméticos (Mejora 1)
        document.write("<h3>Resultados aritméticos</h3>");
        document.write("<p>El resultado de multiplicar " + A + " por " + B + " es " + multiplica + "</p>");
        document.write("<p>El resultado de dividir " + A + " entre " + B + " es " + divide + "</p>");
        document.write("<p>El resultado de sumar " + A + " y " + B + " es " + suma + "</p>");
        document.write("<p>El resultado de restar " + A + " menos " + B + " es " + resta + "</p>");

        // Resultados de comparación (Mejora 2)
        document.write("<h2Resultados de comparación</h2>");
        document.write("<p>El resultado de evaluar si " + A + " y " + B + " son iguales (==) es: " + (A == B) + "</p>");
        document.write("<p>El resultado de evaluar si " + A + " y " + B + " son distintos (!=) es: " + (A != B) + "</p>");
        document.write("<p>El resultado de evaluar si " + A + " es menor que (<) " + B + " es: " + (A < B) + "</p>");
        document.write("<p>El resultado de evaluar si " + A + " es mayor que (>) " + B + " es: " + (A > B) + "</p>");
    </script>

</body>
</html>
