<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Cálculo de área de un círculo</title>
  <style>
    h2 {
      color: dark red;
    }
  </style>
</head>
<body>

<script>
// Pedimos el radio del círculo
let radio = prompt("Dame el radio del círculo");

// Convertimos a número real
radio = parseFloat(radio);

// Función para calcular el área de un círculo
function calcularAreaCirculo(r) {
  return Math.PI * (r * r);
}

// Validamos los datos
if (isNaN(radio) || radio <= 0) {
  document.write("<h2>Por favor introduce un valor válido mayor que 0.</h2>");
} else {
  // Calculamos el área
  let area = calcularAreaCirculo(radio);

  // Mostramos el resultado
  document.write("<h2>El área de su círculo es: " + area.toFixed(2) + "</h2>");
}
</script>

</body>
</html>
