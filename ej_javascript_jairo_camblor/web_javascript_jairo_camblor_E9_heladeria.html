<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 09 — Heladería</title>
</head>
<body>

    <h1>Ejercicio 09 — Heladería</h1>
    <h2>Personaliza tu helado y calcula el precio</h2>

    <script>
        // Paso 1: Variable de precio acumulado
        var precioTotal = 0;

        // --- ELECCIÓN 1: TAMAÑO (Uso de if/else) ---
        var tamano = prompt("Elige tamaño: pequeño (1€), mediano (2€) o grande (3€)");

        if (tamano == "pequeño") {
            precioTotal += 1;
        } else if (tamano == "mediano") {
            precioTotal += 2;
        } else if (tamano == "grande") {
            precioTotal += 3;
        } else {
            precioTotal += 0; // Si no elige bien, no suma
        }

        // --- ELECCIÓN 2: SABOR (Uso de switch obligatorio) ---
        var sabor = prompt("Elige sabor: vainilla, fresa (básicos 0€) o pistacho, turrón (premium +1€)");

        switch (sabor) {
            case "vainilla":
            case "fresa":
                precioTotal += 0;
                break;
            case "pistacho":
            case "turrón":
                precioTotal += 1;
                break;
            default:
                precioTotal += 0;
        }

        // --- ELECCIÓN 3: TOPPING (Uso de if/else) ---
        var topping = prompt("Elige topping: sirope, virutas (0.30€) o oreo, brownie (0.50€)");

        if (topping == "sirope" || topping == "virutas") {
            precioTotal += 0.30;
        } else if (topping == "oreo" || topping == "brownie") {
            precioTotal += 0.50;
        }

        // --- SALIDA FINAL ---
        // Mostramos el precio final en un H1
        document.write("<h1>El precio final es: " + precioTotal.toFixed(2) + " €</h1>");
        
        // Mostramos el resumen en un H3
        document.write("<h3>Tu pedido: Helado " + tamano + " de " + sabor + " con " + topping + ".</h3>");
        
        // Imagen final
        document.write('<img src="https://images.unsplash.com/photo-1567206563064-6f60f40a2b57?auto=format&fit=crop&w=400" alt="Helado" width="300">');
    </script>

</body>
</html>
