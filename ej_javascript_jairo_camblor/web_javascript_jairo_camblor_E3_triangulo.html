<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Cálculo de área de un triángulo</title>
  <style>
    h2 {
      color: dark blue;
    }
  </style>
</head>
<body>

<script>
// Pedimos la base y la altura del triángulo
let base = prompt("Dame la base del triángulo");
let altura = prompt("Dame la altura del triángulo");

// Convertimos a número real
base = parseFloat(base);
altura = parseFloat(altura);

// Función para calcular el área de un triángulo
function calcularAreaTriangulo(b, h) {
  return (b * h) / 2;
}

// Validamos los datos
if (isNaN(base) || isNaN(altura) || base <= 0 || altura <= 0) {
  document.write("<h2>Por favor introduce valores válidos mayores que 0.</h2>");
} else {
  // Calculamos el área
  let area = calcularAreaTriangulo(base, altura);

  // Mostramos el resultado
  document.write("<h2>El área de su triángulo es: " + area + "</h2>");
}
</script>

</body>
</html>
